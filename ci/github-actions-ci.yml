# GitHub Actions workflow for arw2uhdr.
#
# Committed here rather than at .github/workflows/ci.yml because the token used
# to push this branch lacks the `workflow` scope. To enable CI, move this file:
#     mkdir -p .github/workflows && git mv ci/github-actions-ci.yml .github/workflows/ci.yml
name: ci

on:
  push:
    branches: [main, refactor]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install LibRaw
        run: sudo apt-get update && sudo apt-get install -y libraw-dev pkg-config

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          check-latest: true

      - name: Verify formatting
        run: test -z "$(gofmt -l .)" || (gofmt -l . && echo 'gofmt needed on the files above' && exit 1)

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

      - name: Build
        run: go build ./...
